<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Канбан-доска</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="logOut">
        <button id="logoutBtn">Выйти</button>
    </div>
    <div class="board-container">
        <h1>Моя канбан-доска</h1>
        
        <div class="board">
            <div class="column">
                <h2>To Do</h2>
                <ul class="task-list" id="todo-list">
                    <li class="task-card">Изучить HTML/CSS</li>
                    <li class="task-card">Сверстать форму входа</li>
                    <li class="task-card">Настроить json-server</li>
                </ul>
            </div>
            
            <div class="column">
                <h2>In Progress</h2>
                <ul class="task-list" id="progress-list">
                    <li class="task-card">Изучить Flexbox</li>
                    <li class="task-card">Сверстать канбан-доску</li>
                </ul>
            </div>
            
            <div class="column">
                <h2>Done</h2>
                <ul class="task-list" id="done-list">
                    <li class="task-card">Создать репозиторий</li>
                </ul>
            </div>
            <div class="AddBtnCont">
                <form action="#" method="post" id="AddBtnContent">
                    <button id="AddTaskBtn">Добавить задачу</button>
                </form>
            </div>
        </div>
    </div>
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Добавить новую задачу</h2>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Название задачи" required>
                <select id="taskStatus" required>
                    <option value="todo">To Do</option>
                    <option value="in-progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
                <button type="submit">Создать задачу</button>
            </form>
        </div>
    </div>
    <script src="../js/main.js"></script>
</body>
</html>
