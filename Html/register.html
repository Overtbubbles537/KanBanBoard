<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/register.css">
    <title>Registration</title>
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        <form action="#" method="post" id="registerForm" class="input">
            <input type="text" id="nickname" placeholder="Введите никнейм">
            <input type="email" id="email" placeholder="email">
            <input type="password" id="password1" placeholder="Пароль">
            <input type="password" id="password2" placeholder="Повтор пароля">
            <button class="Submit">Отправить</button>
        </form>
        <div class="frase">
            <p>Уже есть аккаунт? <a href="index.html">Войти</a></p>
        </div>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
